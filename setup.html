<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Zentra POS – Setup</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f9fafb;
    }

    .card {
      background: #111111;
      padding: 36px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.65);
      border: 1px solid #262626;
    }

    h1 {
      font-size: 26px;
      text-align: center;
      margin-bottom: 8px;
      color: #f9fafb;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #a1a1aa;
      margin-bottom: 24px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #e5e7eb;
      display: block;
      margin-bottom: 8px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 12px 14px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #3f3f46;
      outline: none;
      background: #18181b;
      color: #f9fafb;
    }

    input::placeholder {
      color: #71717a;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
      background: #1f1f23;
    }

    .suffix {
      font-size: 14px;
      color: #a1a1aa;
      white-space: nowrap;
    }

    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 6px;
      margin-bottom: 18px;
    }

    .error {
      background: #2a1111;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 14px;
      display: none;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover:enabled {
      background: #1d4ed8;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      text-align: center;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>
      Zentra<span style="color: #00C853;">POS</span>
    </h1>
    <p>Enter your tenant to continue</p>

    <form id="form">
      <label for="tenant">Tenant ID</label>

      <div class="row">
        <input
          id="tenant"
          type="text"
          placeholder="bellavista"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
          required
        />
        <span class="suffix">.zentrapos.online</span>
      </div>

      <div class="hint">Example: bellavista</div>

      <div id="error" class="error"></div>

      <button id="submit" type="submit">Continue</button>
    </form>

    <div class="footer">
      Need help? support@zentrapos.com
    </div>
  </div>

  <script>
    const CONFIG_KEY = "app_server_url";
    const tenantRegex = /^[a-z0-9-]+$/; // bellavista only

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.style.display = "block";
    }

    async function getSavedTenant() {
      if (!window.Capacitor?.isNativePlatform?.()) return null;

      const Preferences = window.Capacitor.Plugins?.Preferences;
      if (!Preferences) return null;

      const { value } = await Preferences.get({ key: CONFIG_KEY });
      return value || null;
    }

    async function saveTenant(url) {
      const Preferences = window.Capacitor.Plugins.Preferences;
      await Preferences.set({ key: CONFIG_KEY, value: url });
    }

    async function autoRedirectIfSaved() {
      const saved = await getSavedTenant();
      if (saved) {
        window.location.replace(saved);
      }
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const input = document.getElementById("tenant");
      const btn = document.getElementById("submit");
      const tenant = input.value.trim().toLowerCase();

      if (!tenantRegex.test(tenant)) {
        showError("Invalid tenant name.");
        return;
      }

      const url = "https://" + tenant + ".zentrapos.online";

      btn.disabled = true;
      btn.textContent = "Connecting…";

      try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 5000);

        const res = await fetch(url + "/api/csrf-token", {
          signal: controller.signal,
        });

        if (!res.ok) throw new Error("Server unreachable");

        await saveTenant(url);
        window.location.href = url;
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Continue";
        showError("Unable to connect to tenant server.");
      }
    });

    autoRedirectIfSaved();
  </script>
</body>
</html>
